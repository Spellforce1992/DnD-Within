<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>D&D Within — Valoria</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
    <div class="particles" id="particles"></div>
    <canvas id="lightning-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:50;display:none;opacity:0.9;"></canvas>

    <!-- SVG filters for organic flame effects -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
      <defs>
        <filter id="flame-warp" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.035 0.07" numOctaves="3" seed="0" result="turb">
            <animate attributeName="seed" from="0" to="100" dur="3s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="20" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="flame-warp-intense" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.03 0.06" numOctaves="4" seed="0" result="turb">
            <animate attributeName="seed" from="0" to="150" dur="2.5s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="30" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="flame-warp-inferno" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.025 0.055" numOctaves="4" seed="0" result="turb">
            <animate attributeName="seed" from="0" to="200" dur="2s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="38" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script src="script.js"></script>
    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="i18n.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
    <script src="effects.js"></script>
    <script src="sync.js"></script>
    <script src="app.js"></script>
</body>
</html>
