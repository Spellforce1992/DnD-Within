<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>D&D Within — Valoria</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="app"></div>
    <div class="particles" id="particles"></div>
    <!-- Firebase SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script src="script.js"></script>
    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="i18n.js"></script>
    <script>
    if('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
            reg.addEventListener('updatefound', function() {
                var newSW = reg.installing;
                newSW.addEventListener('statechange', function() {
                    if (newSW.state === 'activated') location.reload();
                });
            });
            // Check for updates on every page load
            reg.update();
        });
    }
    </script>
    <script src="effects.js"></script>
    <script src="sync.js"></script>
    <script src="core.js"></script>
    <script src="families.js"></script>

    <script src="ui-pages.js"></script>
    <script src="dashboard-data.js"></script>
    <script src="widgets.js"></script>
    <script src="dashboard.js"></script>
    <script src="dashboard-edit.js"></script>
    <script src="ui-character.js"></script>
    <script src="ui-world.js"></script>
    <script src="ui-modals.js"></script>
    <script src="ui-settings.js"></script>
    <script src="events.js"></script>
    <script src="app.js"></script>
    <script type="module" src="social/dnd-init.js"></script>
</body>
</html>
